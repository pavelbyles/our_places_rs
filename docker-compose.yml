version: '3.8'

services:
  db:
    image: postgres:15
    container_name: ourplaces_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=our_places
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  booking_api:
    build:
      context: .
      dockerfile: Dockerfile.booking_api
      args:
        BUILD_TYPE: debug
        BUILD_OUTPUT: debug
        RELEASE_FLAG: ""
    ports:
      - "8081:8080"
    environment:
      - RUST_LOG=debug
      - EA__DATABASE__HOST=db
      - EA__DATABASE__PORT=5432
      - EA__DATABASE__USERNAME=postgres
      - EA__DATABASE__PASSWORD=password
      - EA__DATABASE__DATABASE_NAME=our_places
      - EA__DATABASE__CLOUD=false
    depends_on:
      db:
        condition: service_healthy

  listing_api:
    build:
      context: .
      dockerfile: Dockerfile.listing_api
      args:
        BUILD_TYPE: debug
        BUILD_OUTPUT: debug
        RELEASE_FLAG: ""
    ports:
      - "8082:8080"
    environment:
      - RUST_LOG=debug
      - EA__DATABASE__HOST=db
      - EA__DATABASE__PORT=5432
      - EA__DATABASE__USERNAME=postgres
      - EA__DATABASE__PASSWORD=password
      - EA__DATABASE__DATABASE_NAME=our_places
      - EA__DATABASE__CLOUD=false
    depends_on:
      db:
        condition: service_healthy

  user_api:
    build:
      context: .
      dockerfile: Dockerfile.user_api
      args:
        BUILD_TYPE: debug
        BUILD_OUTPUT: debug
        RELEASE_FLAG: ""
    ports:
      - "8083:8080"
    environment:
      - RUST_LOG=debug
      - EA__DATABASE__HOST=db
      - EA__DATABASE__PORT=5432
      - EA__DATABASE__USERNAME=postgres
      - EA__DATABASE__PASSWORD=password
      - EA__DATABASE__DATABASE_NAME=our_places
      - EA__DATABASE__CLOUD=false
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data_dev:
