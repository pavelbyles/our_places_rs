services:
  db:
    image: postgres:18
    container_name: ourplaces_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=our_places
    volumes:
      - postgres_data_dev:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  booking_api:
    build:
      context: .
      dockerfile: Dockerfile.booking_api
      args:
        BUILD_TYPE: debug
        BUILD_OUTPUT: debug
        RELEASE_FLAG: ""
    ports:
      - "8081:8080"
    environment:
      - RUST_LOG=info,booking_api=debug,db_core=debug
      - EA__DATABASE__HOST=db
      - EA__DATABASE__PORT=5432
      - EA__DATABASE__USERNAME=postgres
      - EA__DATABASE__PASSWORD=password
      - EA__DATABASE__DATABASE_NAME=our_places
      - EA__DATABASE__CLOUD=false
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://0.0.0.0:8080/api/v1/bookings/health_check",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  listing_api:
    build:
      context: .
      dockerfile: Dockerfile.listing_api
      args:
        BUILD_TYPE: debug
        BUILD_OUTPUT: debug
        RELEASE_FLAG: ""
    ports:
      - "8082:8080"
    environment:
      - RUST_LOG=info,listing_api=debug,db_core=debug
      - EA__DATABASE__HOST=db
      - EA__DATABASE__PORT=5432
      - EA__DATABASE__USERNAME=postgres
      - EA__DATABASE__PASSWORD=password
      - EA__DATABASE__DATABASE_NAME=our_places
      - EA__DATABASE__CLOUD=false
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://0.0.0.0:8080/api/v1/listings/health_check",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  user_api:
    build:
      context: .
      dockerfile: Dockerfile.user_api
      args:
        BUILD_TYPE: debug
        BUILD_OUTPUT: debug
        RELEASE_FLAG: ""
    ports:
      - "8083:8080"
    environment:
      - RUST_LOG=info,user_api=debug,db_core=debug
      - EA__DATABASE__HOST=db
      - EA__DATABASE__PORT=5432
      - EA__DATABASE__USERNAME=postgres
      - EA__DATABASE__PASSWORD=password
      - EA__DATABASE__DATABASE_NAME=our_places
      - EA__DATABASE__CLOUD=false
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "curl", "-f", "http://0.0.0.0:8080/api/v1/users/health_check"]
      interval: 10s
      timeout: 5s
      retries: 5

  web_app:
    build:
      context: .
      dockerfile: web_app/Dockerfile.web_app
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info,web_app=debug
      - LISTING_API_URL=http://listing_api:8080
      - USER_API_URL=http://user_api:8080
      - BOOKING_API_URL=http://booking_api:8080
      - LEPTOS_SITE_ADDR=0.0.0.0:8080
    depends_on:
      db:
        condition: service_healthy
      listing_api:
        condition: service_healthy
      user_api:
        condition: service_healthy
      booking_api:
        condition: service_healthy

  web_app_admin:
    build:
      context: .
      dockerfile: web_app_admin/Dockerfile.web_app_admin
    ports:
      - "8084:8080"
    environment:
      - RUST_LOG=info,web_app_admin=debug
      - LISTING_API_URL=http://listing_api:8080
      - USER_API_URL=http://user_api:8080
      - BOOKING_API_URL=http://booking_api:8080
      - LEPTOS_SITE_ADDR=0.0.0.0:8080
      - DATABASE_URL=postgres://postgres:password@db:5432/our_places
    depends_on:
      db:
        condition: service_healthy
      listing_api:
        condition: service_healthy
      user_api:
        condition: service_healthy
      booking_api:
        condition: service_healthy

volumes:
  postgres_data_dev:
