refresh_rate: 30 seconds

appenders:
  stdout:
    kind: console
    encoder:
      kind: json
    filters:
      - kind: threshold
        level: info
  
  stdfile_appender:
    kind: file
    path: "log/requests.log"
    encoder:
      pattern: "{d} - {m}{n}"

  special_case_logger:
    kind: file
    path: "log/special.log"
    encoder:
      pattern: "{d} - {m}{n}"

  json_appender:
    kind: file
    path: "log/json_log.log"
    encoder:
      kind: json

loggers:
  root:
    level: info
    appenders:
      - stdout
      - stdfile_appender
      - json_appender

  special:
    level: info
    appenders:
      - special_case_logger
    additive: false
