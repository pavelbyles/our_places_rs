swagger: '2.0'
info:
  version: '0.1'
  title: Our-Places-App-api
  description: API to manage OurPlaces data
  contact: {}
host: our-places-app-api.apigateway.our-places-dev.cloud.goog
basePath: /
securityDefinitions: {}
schemes:
  - https
security:
  - api_key: []
consumes:
  - application/json
produces:
  - application/json
x-google-backend:
  address: https://our-places-app-api-rs-applxgnleq-uc.a.run.app

paths:
  /health/health_check:
    get:
      description: Gives a static response
      summary: ping
      operationId: ping
      deprecated: false
      produces:
        - application/json
      parameters: []
      responses:
        '200':
          description: Definition generated from Swagger Inspector
          schema:
            $ref: '#/definitions/PingResponse'
          headers: {}
      security: []
  /cfg:
    get:
      description: ''
      summary: configuration
      operationId: configuration
      deprecated: false
      produces:
        - application/json
      parameters: []
      responses:
        '200':
          description: Definition generated from Swagger Inspector
          schema:
            $ref: '#/definitions/Config'
          headers: {}
  /hello:
    get:
      description: ''
      summary: static_response
      operationId: static_response
      deprecated: false
      produces:
        - application/json
      parameters: []
      responses:
        '200':
          description: Definition generated from Swagger Inspector
          schema:
            $ref: '#/definitions/HelloResponse'
          headers: {}
  /hello/{name}:
    get:
      description: ''
      summary: helloName
      operationId: helloName
      deprecated: false
      produces:
        - application/json
      parameters:
        - name: name
          in: path
          required: true
          type: string
          description: ''
      responses:
        '200':
          description: Definition generated from Swagger Inspector
          schema:
            $ref: '#/definitions/HelloResponse'
          headers: {}
  /listing:
    post:
      description: ''
      summary: createListing
      operationId: createListing
      deprecated: false
      produces:
        - application/json
      consumes:
        - '*/*'
      parameters:
        - name: Content-Type
          in: header
          required: false
          enum:
            - '*/*'
          type: string
          description: ''
        - name: body
          in: body
          required: false
          description: The listing to create
          schema:
            $ref: '#/definitions/Listing'
      responses:
        '400':
          description: Invalid input
          headers: {}
        '422':
          description: Validation exception
          headers: {}
  /listing-async:
    post:
      description: ''
      summary: createListingAsync
      operationId: createListingAsync
      deprecated: false
      produces:
        - application/json
      consumes:
        - application/json
      parameters:
        - name: Content-Type
          in: header
          required: false
          enum:
            - application/json
          type: string
          description: ''
        - name: body
          in: body
          required: false
          description: The listing to create
          schema:
            $ref: '#/definitions/ListingAsync'
      responses:
        '202':
          description: Accepted - The request has been accepted for processing, and the callback will be triggered later.
          schema:
            $ref: '#/definitions/CreateListingAsyncWebhookRequest'
          headers: {}
        '400':
          description: Invalid input
          headers: {}
        '422':
          description: Validation exception
          headers: {}
definitions:
  PingResponse:
    title: PingResponse
    type: object
    properties:
      status:
        type: string
  Config:
    title: Config
    type: object
    properties:
      target:
        type: string
      port:
        type: integer
        format: int32
  HelloResponse:
    title: HelloResponse
    type: object
    properties:
      response:
        type: string
  Listing:
    title: Listing
    type: object
    properties:
      id:
        description: UUID of the listing
        type: string
      name:
        description: Unique name of the listing
        example: Ocean view villa
        type: string
      description:
        description: Short description of the listing
        type: string
      structure:
        type: object
        allOf:
          - $ref: '#/definitions/Structure'
          - description: Type of accommodation
      country:
        description: Country that the listing is in
        example: Jamaica
        type: string
      price_per_night:
        description: Base cost of the listing
        type: number
        format: double
      is_active:
        type: boolean
    required:
      - name
  ListingAsync:
    title: ListingAsync
    type: object
    properties:
      id:
        description: UUID of the listing
        type: string
      name:
        description: Unique name of the listing
        example: Ocean view villa
        type: string
      description:
        description: Short description of the listing
        type: string
      structure:
        type: object
        allOf:
          - $ref: '#/definitions/Structure'
          - description: Type of accommodation
      country:
        description: Country that the listing is in
        example: Jamaica
        type: string
      price_per_night:
        description: Base cost of the listing
        type: number
        format: double
      is_active:
        type: boolean
      request_ref_id:
        description: UUID of the callers request
        type: string
      callbackUrl:
        example: https://other-server.com
        type: string
    required:
      - name
      - request_ref_id
      - callbackUrl
  CreateListingAsyncWebhookRequest:
    title: CreateListingAsyncWebhookRequest
    type: object
    properties:
      id:
        description: The reference ID used in the original request
        type: string
      status:
        $ref: '#/definitions/Status'
      statusReason:
        description: The reason why it failed, blank otherwise
        type: string
  CreateListingAsyncResponse:
    title: CreateListingAsyncResponse
    type: object
    properties:
      ref_id:
        description: ID given for the request that is being handled asynchronously
        type: string
  Status:
    title: Status
    type: string
    enum:
      - Completed
      - Failed
  Structure:
    title: Structure
    description: Type of accommodation
    type: string
    enum:
      - Apartment
      - House
      - Townhouse
      - Studio
      - Villa
tags: []
