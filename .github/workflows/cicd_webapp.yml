name: CI/CD for FE webapp
env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT }}
  #SERVICE: our-places-app-api-rs
  REGION: us-central1
  CARGO_TERM_COLOR: always

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - web_app/**
      - .github/workflows/cicd_webapp.yml
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.3.9'
          channel: 'stable'
      
      - name: Run Flutter tests
        run: |
          flutter --version
          flutter pub get
          flutter test
  
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/dev'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.3.9'
          channel: 'stable'
      
      - name: Build
        working-directory: ./web_app
        run: |
          flutter --version
          flutter pub get
          flutter build web