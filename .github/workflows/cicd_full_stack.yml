name: Full Stack CI/CD

env:
  ENV_SUFFIX: ${{ github.ref == 'refs/heads/main' && 'PROD' || 'DEV' }}
  PROJECT_ID: ${{ secrets.GCP_PROJECT }}
  GAR_REPO: ${{ vars.GAR_REPO}}
  REGION: us-central1
  SERVICE_PREFIX: our-places-web-app
  SERVICE_PREFIX_ADMIN: our-places-web-app-admin
  CARGO_TERM_COLOR: always

on:
  push:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================
  # GENERAL QUALITY CHECKS
  # =========================================================
  audit:
    name: Audit
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit
      - run: cargo audit --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2023-0071

  lint-check:
    name: Lint Check
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Install protobuf-compiler
        run: sudo apt-get install protobuf-compiler -y
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - name: Run Clippy
        env:
          RUN_ENV: Development
          SQLX_OFFLINE: true
          DATABASE_URL: postgres://postgres:password@localhost:5432/our_places
        run: cargo clippy --all-features --manifest-path Cargo.toml -- -D warnings
  # =========================================================
  # Test API's and Web App
  # =========================================================
  test-api:
    name: Test API
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Install protobuf-compiler
        run: sudo apt-get install protobuf-compiler -y
      - name: Install cargo make
        uses: davidB/rust-cargo-make@v1
      - name: Install sqlx
        run: |-
          sudo apt-get install libpq-dev -y
          cargo install --version=~0.8 sqlx-cli --no-default-features --features rustls,postgres --force
      - name: Build app
        env:
          RUN_ENV: Development
          SQLX_OFFLINE: true
          DATABASE_URL: postgres://postgres:password@localhost:5432/our_places
        run: cargo build --verbose --workspace --exclude web_app
      - name: Run DB and Migrations (Local Test)
        run: cargo make --cwd app_api/listing_api db-migrate
      - name: Run tests
        env:
          RUN_ENV: Development
          SQLX_OFFLINE: true
          DATABASE_URL: postgres://postgres:password@localhost:5432/our_places
        run: cargo test --verbose --workspace --exclude web_app

  test-web:
    name: Test Web
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - uses: dtolnay/rust-toolchain@nightly
      - name: Run web_app tests
        run: cargo test --manifest-path web_app/Cargo.toml --verbose

  # =========================================================
  # DEPLOY API
  # =========================================================
  deploy-api:
    name: Build & Deploy APIs
    runs-on: ubuntu-latest
    needs: [audit, lint-check, test-api]
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: ./app_api
    env:
      SA_BOOKING_API: ${{ vars[format('INFRA_SA_BOOKING_API_{0}', github.ref == 'refs/heads/main' && 'PROD' || 'DEV')] }}
      SA_LISTING_API: ${{ vars[format('INFRA_SA_LISTING_API_{0}', github.ref == 'refs/heads/main' && 'PROD' || 'DEV')] }}
      SA_USER_API: ${{ vars[format('INFRA_SA_USER_API_{0}', github.ref == 'refs/heads/main' && 'PROD' || 'DEV')] }}
      DB_USER: ${{ vars[format('DB_USER_{0}', github.ref == 'refs/heads/main' && 'PROD' || 'DEV')] }}
      DB_PASS: ${{ secrets[format('DB_PASSWORD_{0}', github.ref == 'refs/heads/main' && 'PROD' || 'DEV')] }}
      DB_NAME: ${{ vars[format('DB_NAME_{0}', github.ref == 'refs/heads/main' && 'PROD' || 'DEV')] }}
      DB_INSTANCE_NAME: ${{ vars[format('DB_INSTANCE_NAME_{0}', github.ref == 'refs/heads/main' && 'PROD' || 'DEV')] }}
    permissions:
      contents: "read"
      id-token: "write"
      issues: "write"
      pull-requests: "write"
    outputs:
      service_suffix: ${{ steps.branch_name.outputs.SERVICE_SUFFIX }}
      schema_name: ${{ steps.branch_name.outputs.SCHEMA_NAME }}
      listing_url: ${{ steps.construct_urls.outputs.listing_url }}
      booking_url: ${{ steps.construct_urls.outputs.booking_url }}
      user_url: ${{ steps.construct_urls.outputs.user_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - id: "auth"
        name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@v1"
        with:
          credentials_json: "${{ secrets.GCP_CREDENTIALS }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Sanitize Branch Name
        id: branch_name
        shell: bash
        run: |
          SAFE_BRANCH_slug=$(echo "${{ github.ref_name }}" | tr '/' '-' | tr '_' '-' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]//g')
          SAFE_SCHEMA_name=$(echo "${{ github.ref_name }}" | tr '/' '_' | tr '-' '_' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_]//g')
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            SAFE_SCHEMA_name="public"
          elif [[ $SAFE_SCHEMA_name =~ ^[0-9] ]]; then
            SAFE_SCHEMA_name="_$SAFE_SCHEMA_name"
          fi
          echo "SERVICE_SUFFIX=$SAFE_BRANCH_slug" >> $GITHUB_OUTPUT
          echo "SCHEMA_NAME=$SAFE_SCHEMA_name" >> $GITHUB_OUTPUT

      - name: Get Project Number & Construct URLs
        id: construct_urls
        run: |
          PROJECT_NUMBER=$(gcloud projects describe ${{ env.PROJECT_ID }} --format="value(projectNumber)")
          SERVICE_SUFFIX=${{ steps.branch_name.outputs.SERVICE_SUFFIX }}
          REGION=${{ env.REGION }}

          echo "listing_url=https://listing-api-$SERVICE_SUFFIX-$PROJECT_NUMBER.$REGION.run.app" >> $GITHUB_OUTPUT
          echo "booking_url=https://booking-api-$SERVICE_SUFFIX-$PROJECT_NUMBER.$REGION.run.app" >> $GITHUB_OUTPUT
          echo "user_url=https://user-api-$SERVICE_SUFFIX-$PROJECT_NUMBER.$REGION.run.app" >> $GITHUB_OUTPUT

      - name: Set Build Arguments
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "RELEASE_FLAG=--release" >> $GITHUB_ENV
            echo "BUILD_OUTPUT=release" >> $GITHUB_ENV
          else
            echo "RELEASE_FLAG=" >> $GITHUB_ENV
            echo "BUILD_OUTPUT=debug" >> $GITHUB_ENV
          fi

      - name: Install SQLX CLI
        run: cargo install --version=~0.8 sqlx-cli --no-default-features --features rustls,postgres --force

      - name: Setup Preview Schema
        env:
          DB_INSTANCE: ${{ env.PROJECT_ID }}:${{ env.REGION }}:${{ vars[format('DB_INSTANCE_NAME_{0}', github.ref == 'refs/heads/main' && 'PROD' || 'DEV')] }}
          SCHEMA_NAME: ${{ steps.branch_name.outputs.SCHEMA_NAME }}
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          wget https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.0/cloud-sql-proxy.linux.amd64 -O cloud-sql-proxy
          chmod +x cloud-sql-proxy
          ./cloud-sql-proxy --port 5432 $DB_INSTANCE &
          PID=$!
          sleep 5
          echo "Creating schema $SCHEMA_NAME if not exists..."
          export PGPASSWORD=$DB_PASS
          psql -h "127.0.0.1" -U "$DB_USER" -d "$DB_NAME" -c "CREATE SCHEMA IF NOT EXISTS \"$SCHEMA_NAME\";"

          # Run Migrations against the new schema
          echo "Running migrations..."
          # We need to set DATABASE_URL for sqlx. We point to the proxy on localhost.
          # We also need to set the search_path to the new schema so migrations apply there!
          export DATABASE_URL="postgres://$DB_USER:$DB_PASS@127.0.0.1:5432/$DB_NAME?options=-c%20search_path%3D$SCHEMA_NAME"
          # Run migrations using the sqlx cli we installed
          sqlx migrate run --source ../db_core/migrations

          kill $PID

      # Booking API
      - name: Build and Push Booking API
        run: |
          docker build \
            --build-arg RELEASE_FLAG=${{ env.RELEASE_FLAG }} \
            --build-arg BUILD_OUTPUT=${{ env.BUILD_OUTPUT }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/booking-api:${{ github.sha }} \
            -f ../Dockerfile.booking_api ..
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/booking-api:${{ github.sha }}

      - name: Deploy Booking API
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: booking-api-${{ steps.branch_name.outputs.SERVICE_SUFFIX }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/booking-api:${{ github.sha }}
          region: ${{ env.REGION }}
          env_vars: |
            LOG_FORMAT=json
            RUST_LOG=info
            EA__SERVER__HOST=0.0.0.0
            EA__SERVER__PORT=8080
            EA__DATABASE__CLOUD=true
            EA__DATABASE__INSTANCE_NAME=${{ env.PROJECT_ID }}:${{ env.REGION }}:${{ env.DB_INSTANCE_NAME }}
            EA__DATABASE__USERNAME=${{ env.DB_USER }}
            EA__DATABASE__PASSWORD=${{ env.DB_PASS }}
            EA__DATABASE__DATABASE_NAME=${{ env.DB_NAME}}
            EA__DATABASE__DATABASE_URL=postgres://${{ env.DB_USER }}:${{ env.DB_PASS }}@localhost/${{ env.DB_NAME}}?host=/cloudsql/${{ env.PROJECT_ID }}:${{ env.REGION }}:${{ env.DB_INSTANCE_NAME }}&options=-c%20search_path%3D${{ steps.branch_name.outputs.SCHEMA_NAME }}
          flags: "--no-allow-unauthenticated --service-account ${{ env.SA_BOOKING_API }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com --ingress=all --min-instances=0 --max-instances=1 --memory=256Mi --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:${{ env.DB_INSTANCE_NAME }} --quiet"

      # Listing API
      - name: Build and Push Listing API
        run: |
          docker build \
            --build-arg RELEASE_FLAG=${{ env.RELEASE_FLAG }} \
            --build-arg BUILD_OUTPUT=${{ env.BUILD_OUTPUT }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/listing-api:${{ github.sha }} \
            -f ../Dockerfile.listing_api ..
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/listing-api:${{ github.sha }}

      - name: Deploy Listing API
        id: deploy_listing
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: listing-api-${{ steps.branch_name.outputs.SERVICE_SUFFIX }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/listing-api:${{ github.sha }}
          region: ${{ env.REGION }}
          env_vars: |
            LOG_FORMAT=json
            RUST_LOG=info
            EA__SERVER__HOST=0.0.0.0
            EA__SERVER__PORT=8080
            EA__DATABASE__CLOUD=true
            EA__DATABASE__INSTANCE_NAME=${{ env.PROJECT_ID }}:${{ env.REGION }}:${{ env.DB_INSTANCE_NAME }}
            EA__DATABASE__USERNAME=${{ env.DB_USER }}
            EA__DATABASE__PASSWORD=${{ env.DB_PASS }}
            EA__DATABASE__DATABASE_NAME=${{ env.DB_NAME}}
            EA__DATABASE__DATABASE_URL=postgres://${{ env.DB_USER }}:${{ env.DB_PASS }}@localhost/${{ env.DB_NAME}}?host=/cloudsql/${{ env.PROJECT_ID }}:${{ env.REGION }}:${{ env.DB_INSTANCE_NAME }}&options=-c%20search_path%3D${{ steps.branch_name.outputs.SCHEMA_NAME }}
          flags: "--no-allow-unauthenticated --service-account ${{ env.SA_LISTING_API }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com --ingress=all --min-instances=0 --max-instances=1 --memory=256Mi --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:${{ env.DB_INSTANCE_NAME }} --quiet"

      # User API
      - name: Build and Push User API
        run: |
          docker build \
            --build-arg RELEASE_FLAG=${{ env.RELEASE_FLAG }} \
            --build-arg BUILD_OUTPUT=${{ env.BUILD_OUTPUT }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/user-api:${{ github.sha }} \
            -f ../Dockerfile.user_api ..
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/user-api:${{ github.sha }}

      - name: Deploy User API
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: user-api-${{ steps.branch_name.outputs.SERVICE_SUFFIX }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/user-api:${{ github.sha }}
          region: ${{ env.REGION }}
          env_vars: |
            LOG_FORMAT=json
            RUST_LOG=info
            EA__SERVER__HOST=0.0.0.0
            EA__SERVER__PORT=8080
            EA__DATABASE__CLOUD=true
            EA__DATABASE__CLOUD=true
            EA__DATABASE__INSTANCE_NAME=${{ env.PROJECT_ID }}:${{ env.REGION }}:${{ env.DB_INSTANCE_NAME }}
            EA__DATABASE__USERNAME=${{ env.DB_USER }}
            EA__DATABASE__PASSWORD=${{ env.DB_PASS }}
            EA__DATABASE__DATABASE_NAME=${{ env.DB_NAME}}
            EA__DATABASE__DATABASE_URL=postgres://${{ env.DB_USER }}:${{ env.DB_PASS }}@localhost/${{ env.DB_NAME}}?host=/cloudsql/${{ env.PROJECT_ID }}:${{ env.REGION }}:${{ env.DB_INSTANCE_NAME }}&options=-c%20search_path%3D${{ steps.branch_name.outputs.SCHEMA_NAME }}
          flags: "--no-allow-unauthenticated --service-account ${{ env.SA_USER_API }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com --ingress=all --min-instances=0 --max-instances=1 --memory=256Mi --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:${{ env.DB_INSTANCE_NAME }} --quiet"

  # =========================================================
  # DEPLOY WEBAPP
  # =========================================================
  deploy-web:
    name: Build & Deploy WebApp
    runs-on: ubuntu-latest
    needs: [audit, lint-check, test-web, deploy-api]
    if: github.event_name == 'push'
    env:
      SA_WEB_APP: ${{ vars[format('INFRA_SA_WEB_APP_{0}', github.ref == 'refs/heads/main' && 'PROD' || 'DEV')] }}
      SA_LISTING_API: ${{ vars[format('INFRA_SA_LISTING_API_{0}', github.ref == 'refs/heads/main' && 'PROD' || 'DEV')] }}
      SA_BOOKING_API: ${{ vars[format('INFRA_SA_BOOKING_API_{0}', github.ref == 'refs/heads/main' && 'PROD' || 'DEV')] }}
      SA_USER_API: ${{ vars[format('INFRA_SA_USER_API_{0}', github.ref == 'refs/heads/main' && 'PROD' || 'DEV')] }}
      GATEWAY_KEY: ${{ secrets[format('INFRA_GATEWAY_API_KEY_{0}', github.ref == 'refs/heads/main' && 'PROD' || 'DEV')] }}
      DB_USER: ${{ vars[format('DB_USER_{0}', github.ref == 'refs/heads/main' && 'PROD' || 'DEV')] }}
      DB_PASS: ${{ secrets[format('DB_PASSWORD_{0}', github.ref == 'refs/heads/main' && 'PROD' || 'DEV')] }}
      DB_NAME: ${{ vars[format('DB_NAME_{0}', github.ref == 'refs/heads/main' && 'PROD' || 'DEV')] }}
      DB_INSTANCE_NAME: ${{ vars[format('DB_INSTANCE_NAME_{0}', github.ref == 'refs/heads/main' && 'PROD' || 'DEV')] }}
    permissions:
      contents: "read"
      id-token: "write"
      issues: "write"
      pull-requests: "write"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - id: "auth"
        name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@v1"
        with:
          credentials_json: "${{ secrets.GCP_CREDENTIALS }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Sanitize Branch Name
        id: branch_name
        shell: bash
        run: |
          SAFE_BRANCH_slug=$(echo "${{ github.ref_name }}" | tr '/' '-' | tr '_' '-' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]//g')
          SERVICE_NAME="${{ env.SERVICE_PREFIX }}-$SAFE_BRANCH_slug"
          SERVICE_NAME_ADMIN="${{ env.SERVICE_PREFIX_ADMIN }}-$SAFE_BRANCH_slug"
          echo "SERVICE_SUFFIX=$SAFE_BRANCH_slug" >> $GITHUB_OUTPUT
          echo "SERVICE_NAME=$SERVICE_NAME" >> $GITHUB_OUTPUT
          echo "SERVICE_NAME_ADMIN=$SERVICE_NAME_ADMIN" >> $GITHUB_OUTPUT

      - name: Set Release Flag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "RELEASE_FLAG=--release" >> $GITHUB_ENV
            echo "BUILD_OUTPUT=release" >> $GITHUB_ENV
          else
            echo "RELEASE_FLAG=" >> $GITHUB_ENV
            echo "BUILD_OUTPUT=debug" >> $GITHUB_ENV
          fi

      - name: Fetch Gateway URL
        id: fetch_gateway
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            GATEWAY_ID="our-places-app-api-gw-prod"
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            GATEWAY_ID="our-places-app-api-gw"
          fi

          echo "Fetching URL for Gateway: $GATEWAY_ID"
            
          gcloud api-gateway gateways describe $GATEWAY_ID \
            --location=us-central1 \
            --project=our-places-dev \
            --format="value(defaultHostname)" > gateway_url.txt
              
          echo "GATEWAY_URL=https://$(cat gateway_url.txt)" >> $GITHUB_OUTPUT

      - name: Build and Push Web App
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE_PREFIX }}:${{ github.sha }} -f web_app/Dockerfile.web_app .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE_PREFIX }}:${{ github.sha }}

      - name: Grant Service Permissions
        run: |
          # Grant Web App SA permission to invoke the Backend APIs
          WEB_APP_SA_EMAIL="${{ env.SA_WEB_APP }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          SUFFIX="${{ needs.deploy-api.outputs.service_suffix }}"

          echo "Granting run.invoker to $WEB_APP_SA_EMAIL for $SUFFIX services

          gcloud run services add-iam-policy-binding listing-api-$SUFFIX \
            --region=${{ env.REGION }} \
            --member="serviceAccount:$WEB_APP_SA_EMAIL" \
            --role="roles/run.invoker" \
            --quiet

          gcloud run services add-iam-policy-binding booking-api-$SUFFIX \
            --region=${{ env.REGION }} \
            --member="serviceAccount:$WEB_APP_SA_EMAIL" \
            --role="roles/run.invoker" \
            --quiet

          gcloud run services add-iam-policy-binding user-api-$SUFFIX \
            --region=${{ env.REGION }} \
            --member="serviceAccount:$WEB_APP_SA_EMAIL" \
            --role="roles/run.invoker" \
            --quiet

      - name: Deploy Web App
        id: deploy_webapp
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ steps.branch_name.outputs.SERVICE_NAME }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE_PREFIX }}:${{ github.sha }}
          region: ${{ env.REGION }}
          env_vars: |
            LOG_FORMAT=json
            RUST_LOG=info
            LEPTOS_SITE_ADDR=0.0.0.0:8080
            LISTING_API_URL=${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && format('{0}/api/v1/listings', steps.fetch_gateway.outputs.GATEWAY_URL) || needs.deploy-api.outputs.listing_url }}
            BOOKING_API_URL=${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && format('{0}/api/v1/bookings', steps.fetch_gateway.outputs.GATEWAY_URL) || needs.deploy-api.outputs.booking_url }}
            USER_API_URL=${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && format('{0}/api/v1/users', steps.fetch_gateway.outputs.GATEWAY_URL) || needs.deploy-api.outputs.user_url }}
            GATEWAY_API_KEY=${{ env.GATEWAY_KEY }}
          flags: "--allow-unauthenticated --service-account ${{ env.SA_WEB_APP }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com --ingress=all --max-instances=1 --memory=256Mi --quiet"

      - name: Build and Push Web App Admin
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE_PREFIX_ADMIN }}:${{ github.sha }} -f web_app_admin/Dockerfile.web_app_admin .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE_PREFIX_ADMIN }}:${{ github.sha }}

      - name: Deploy Web App Admin
        id: deploy_webapp_admin
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ steps.branch_name.outputs.SERVICE_NAME_ADMIN }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.SERVICE_PREFIX_ADMIN }}:${{ github.sha }}
          region: ${{ env.REGION }}
          env_vars: |
            LOG_FORMAT=json
            RUST_LOG=info
            LEPTOS_SITE_ADDR=0.0.0.0:8080
            LISTING_API_URL=${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && format('{0}/api/v1/listings', steps.fetch_gateway.outputs.GATEWAY_URL) || needs.deploy-api.outputs.listing_url }}
            BOOKING_API_URL=${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && format('{0}/api/v1/bookings', steps.fetch_gateway.outputs.GATEWAY_URL) || needs.deploy-api.outputs.booking_url }}
            USER_API_URL=${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && format('{0}/api/v1/users', steps.fetch_gateway.outputs.GATEWAY_URL) || needs.deploy-api.outputs.user_url }}
            GATEWAY_API_KEY=${{ env.GATEWAY_KEY }}
            DATABASE_URL=postgres://${{ env.DB_USER }}:${{ env.DB_PASS }}@localhost/${{ env.DB_NAME }}?host=/cloudsql/${{ env.PROJECT_ID }}:${{ env.REGION }}:${{ env.DB_INSTANCE_NAME }}&options=-c%20search_path%3D${{ needs.deploy-api.outputs.schema_name }}
          flags: "--allow-unauthenticated --service-account ${{ env.SA_WEB_APP }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com --ingress=all --max-instances=1 --memory=256Mi --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:${{ env.DB_INSTANCE_NAME }} --quiet"

      - name: Show Deployed URL for the Web App
        run: echo "Deployed Web App URL ${{ steps.deploy_webapp.outputs.url }}"

      - name: Show Deployed URL for the Web App Admin
        run: echo "Deployed Web App Admin URL ${{ steps.deploy_webapp_admin.outputs.url }}"

      - name: Comment on PR
        uses: actions/github-script@v6
        if: github.event_name == 'pull_request'
        with:
          script: |
            const branch = '${{ steps.branch_name.outputs.SERVICE_SUFFIX }}';
            const webappUrl = '${{ steps.deploy_webapp.outputs.url }}';
            const listingUrl = '${{ needs.deploy-api.outputs.listing_url }}';
            const bookingUrl = '${{ needs.deploy-api.outputs.booking_url }}';
            const userUrl = '${{ needs.deploy-api.outputs.user_url }}';
            const schemaName = '${{ needs.deploy-api.outputs.schema_name }}';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Full Stack Preview Deployed!**\n\n- **Branch:** \`${branch}\`\n- **Web App:** [${webappUrl}](${webappUrl})\n- **Listing API:** [${listingUrl}](${listingUrl})\n- **Booking API:** [${bookingUrl}](${bookingUrl})\n- **User API:** [${userUrl}](${userUrl})\n- **Database Schema:** \`${schemaName}\`\n\nAll services are up and connected!`
