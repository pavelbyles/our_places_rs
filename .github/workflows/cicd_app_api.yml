name: CI/CD for app_api

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT }}
  GAR_REPO: our-places-repo
  REGION: us-central1
  CARGO_TERM_COLOR: always

on:
  push:
    branches: ['**']
    paths:
      - app_api/**
      - .sqlx/**
      - db_core/**
      - .github/workflows/cicd_app_api.yml
      - Cargo.toml
      - Dockerfile.*
  delete:

jobs:
  audit:
    name: Audit
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rs/install@v0.1
        with:
          crate: cargo-audit
          version: latest
          use-tool-cache: true
      - run: cargo audit --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2023-0071

  lint_check:
    name: Lint Check
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install protobuf-compiler
        run: sudo apt-get install protobuf-compiler -y
      - uses: actions-rs/toolchain@v1
        with:
            toolchain: nightly
            components: clippy
            override: true

      - uses: actions-rs/clippy-check@v1
        env:
          RUN_ENV: Development
          SQLX_OFFLINE: true
          # Linting doesn't need a real DB connection thanks to SQLX_OFFLINE
          DATABASE_URL: postgres://postgres:password@localhost:5432/our_places
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --all-features --manifest-path Cargo.toml

  test:
    name: Test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install protobuf-compiler
        run: sudo apt-get install protobuf-compiler -y

      - name: Install cargo make
        uses: davidB/rust-cargo-make@v1

      - name: Install sqlx (needed for compilation and integration tests)
        run: |-
          sudo apt-get install libpq-dev -y
          cargo install --version=~0.8 sqlx-cli --no-default-features --features rustls,postgres --force

      - name: Run DB and Migrations (Local Test)
        run: cargo make --cwd app_api/listing_api db-migrate

      - name: Build app
        env:
          RUN_ENV: Development
          SQLX_OFFLINE: true
          DATABASE_URL: postgres://postgres:password@localhost:5432/our_places
        run: cargo build --verbose
      
      - name: Run tests
        env:
          RUN_ENV: Development
          SQLX_OFFLINE: true
          DATABASE_URL: postgres://postgres:password@localhost:5432/our_places
        run: cargo test --verbose

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [audit, lint_check, test]
    if: github.event_name == 'push'
    
    defaults:
      run:
        working-directory: ./app_api

    # Add "id-token" with the intended permissions.
    permissions:
      contents: 'read'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v3
    
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
      
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # ---------------------------------------------------------
      # Sanitization & Environment Setup
      # ---------------------------------------------------------
      - name: Sanitize Branch Name
        id: branch_name
        shell: bash
        run: |
          # Convert branch name to kebab-case for Cloud Run services: feature/foo_bar -> foo-bar
          # We use github.ref_name which is the branch name
          SAFE_BRANCH_slug=$(echo "${{ github.ref_name }}" | tr '/' '-' | tr '_' '-' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]//g')
          
          # Convert branch name to snake_case for PostgreSQL schema: feature/foo-bar -> feature_foo_bar
          # Valid schemas start with a letter or underscore, contain letters, numbers, underscores.
          SAFE_SCHEMA_name=$(echo "${{ github.ref_name }}" | tr '/' '_' | tr '-' '_' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_]//g')
          
          # Handle potential leading numbers in schema (invalid)
          if [[ $SAFE_SCHEMA_name =~ ^[0-9] ]]; then
            SAFE_SCHEMA_name="_$SAFE_SCHEMA_name"
          fi

          echo "SERVICE_SUFFIX=$SAFE_BRANCH_slug" >> $GITHUB_OUTPUT
          echo "SCHEMA_NAME=$SAFE_SCHEMA_name" >> $GITHUB_OUTPUT
          
          echo "Determined Service Suffix: $SAFE_BRANCH_slug"
          echo "Determined Schema Name: $SAFE_SCHEMA_name"

      - name: Set Build Arguments
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "RELEASE_FLAG=--release" >> $GITHUB_ENV
            echo "BUILD_OUTPUT=release" >> $GITHUB_ENV
          else
            echo "RELEASE_FLAG=" >> $GITHUB_ENV
            echo "BUILD_OUTPUT=debug" >> $GITHUB_ENV
          fi

      - name: Install cargo make
        uses: davidB/rust-cargo-make@v1

      - name: Install SQLX CLI
        run: cargo install --version=~0.8 sqlx-cli --no-default-features --features rustls,postgres --force

      # ---------------------------------------------------------
      # Database Schema Management (Preview Environments)
      # ---------------------------------------------------------
      - name: Setup Preview Schema
        env:
          # Using the DEV instance for all dynamic schemas as per requirements
          DB_INSTANCE: ${{ env.PROJECT_ID }}:${{ env.REGION }}:our-places-db-dev
          DB_USER: ${{ vars.POSTGRES_USER_DEV }}
          DB_PASS: ${{ secrets.POSTGRES_PASSWORD_DEV }}
          DB_NAME: ${{ vars.POSTGRES_DB_DEV }}
          SCHEMA_NAME: ${{ steps.branch_name.outputs.SCHEMA_NAME }}
        run: |
          # Install pg_isready and psql
          sudo apt-get update && sudo apt-get install -y postgresql-client

          # Start Cloud SQL Proxy to connect to the DB
          wget https://dl.google.com/cloudsql/cloud_sql_proxy.linux.amd64 -O cloud_sql_proxy
          chmod +x cloud_sql_proxy
          ./cloud_sql_proxy -instances=$DB_INSTANCE=tcp:5432 &
          PID=$!
          sleep 5

          echo "Creating schema $SCHEMA_NAME if not exists..."
          export PGPASSWORD=$DB_PASS
          psql -h "127.0.0.1" -U "$DB_USER" -d "$DB_NAME" -c "CREATE SCHEMA IF NOT EXISTS \"$SCHEMA_NAME\";"
          
          
          # Kill proxy
          kill $PID

      # ---------------------------------------------------------
      # Booking API
      # ---------------------------------------------------------
      - name: Build and Push Booking API
        run: |
          docker build \
            --build-arg RELEASE_FLAG=${{ env.RELEASE_FLAG }} \
            --build-arg BUILD_OUTPUT=${{ env.BUILD_OUTPUT }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/booking-api:${{ github.sha }} \
            -f ../Dockerfile.booking_api ..
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/booking-api:${{ github.sha }}

      - name: Deploy Booking API
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: booking-api-${{ steps.branch_name.outputs.SERVICE_SUFFIX }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/booking-api:${{ github.sha }}
          region: ${{ env.REGION }}
          env_vars: |
            LOG_FORMAT=json
            RUST_LOG=info
            EA__SERVER__HOST=0.0.0.0
            EA__SERVER__PORT=8080
            EA__DATABASE__CLOUD=true
            EA__DATABASE__INSTANCE_NAME=${{ env.PROJECT_ID }}:${{ env.REGION }}:our-places-db-dev
            EA__DATABASE__USERNAME=${{ vars.POSTGRES_USER_DEV }}
            EA__DATABASE__PASSWORD=${{ secrets.POSTGRES_PASSWORD_DEV }}
            EA__DATABASE__DATABASE_NAME=${{ vars.POSTGRES_DB_DEV}}
            EA__DATABASE__DATABASE_URL=postgres://${{ vars.POSTGRES_USER_DEV }}:${{ secrets.POSTGRES_PASSWORD_DEV }}@localhost/${{ vars.POSTGRES_DB_DEV}}?host=/cloudsql/${{ env.PROJECT_ID }}:${{ env.REGION }}:our-places-db-dev&options=-c%20search_path%3D${{ steps.branch_name.outputs.SCHEMA_NAME }}
          flags: '--no-allow-unauthenticated --min-instances=0 --max-instances=1 --memory=256Mi --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:our-places-db-dev --quiet'

      # ---------------------------------------------------------
      # Listing API
      # ---------------------------------------------------------
      - name: Build and Push Listing API
        run: |
          docker build \
            --build-arg RELEASE_FLAG=${{ env.RELEASE_FLAG }} \
            --build-arg BUILD_OUTPUT=${{ env.BUILD_OUTPUT }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/listing-api:${{ github.sha }} \
            -f ../Dockerfile.listing_api ..
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/listing-api:${{ github.sha }}

      - name: Deploy Listing API
        id: deploy_listing
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: listing-api-${{ steps.branch_name.outputs.SERVICE_SUFFIX }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/listing-api:${{ github.sha }}
          region: ${{ env.REGION }}
          env_vars: |
            LOG_FORMAT=json
            RUST_LOG=info
            EA__SERVER__HOST=0.0.0.0
            EA__SERVER__PORT=8080
            EA__DATABASE__CLOUD=true
            EA__DATABASE__INSTANCE_NAME=${{ env.PROJECT_ID }}:${{ env.REGION }}:our-places-db-dev
            EA__DATABASE__USERNAME=${{ vars.POSTGRES_USER_DEV }}
            EA__DATABASE__PASSWORD=${{ secrets.POSTGRES_PASSWORD_DEV }}
            EA__DATABASE__DATABASE_NAME=${{ vars.POSTGRES_DB_DEV}}
            EA__DATABASE__DATABASE_URL=postgres://${{ vars.POSTGRES_USER_DEV }}:${{ secrets.POSTGRES_PASSWORD_DEV }}@localhost/${{ vars.POSTGRES_DB_DEV}}?host=/cloudsql/${{ env.PROJECT_ID }}:${{ env.REGION }}:our-places-db-dev&options=-c%20search_path%3D${{ steps.branch_name.outputs.SCHEMA_NAME }}
          flags: '--no-allow-unauthenticated --min-instances=0 --max-instances=1 --memory=256Mi --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:our-places-db-dev --quiet'

      # ---------------------------------------------------------
      # User API
      # ---------------------------------------------------------
      - name: Build and Push User API
        run: |
          docker build \
            --build-arg RELEASE_FLAG=${{ env.RELEASE_FLAG }} \
            --build-arg BUILD_OUTPUT=${{ env.BUILD_OUTPUT }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/user-api:${{ github.sha }} \
            -f ../Dockerfile.user_api ..
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/user-api:${{ github.sha }}

      - name: Deploy User API
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: user-api-${{ steps.branch_name.outputs.SERVICE_SUFFIX }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/user-api:${{ github.sha }}
          region: ${{ env.REGION }}
          env_vars: |
            LOG_FORMAT=json
            RUST_LOG=info
            EA__SERVER__HOST=0.0.0.0
            EA__SERVER__PORT=8080
            EA__DATABASE__CLOUD=true
            EA__DATABASE__INSTANCE_NAME=${{ env.PROJECT_ID }}:${{ env.REGION }}:our-places-db-dev
            EA__DATABASE__USERNAME=${{ vars.POSTGRES_USER_DEV }}
            EA__DATABASE__PASSWORD=${{ secrets.POSTGRES_PASSWORD_DEV }}
            EA__DATABASE__DATABASE_NAME=${{ vars.POSTGRES_DB_DEV}}
            EA__DATABASE__DATABASE_URL=postgres://${{ vars.POSTGRES_USER_DEV }}:${{ secrets.POSTGRES_PASSWORD_DEV }}@localhost/${{ vars.POSTGRES_DB_DEV}}?host=/cloudsql/${{ env.PROJECT_ID }}:${{ env.REGION }}:our-places-db-dev&options=-c%20search_path%3D${{ steps.branch_name.outputs.SCHEMA_NAME }}
          flags: '--no-allow-unauthenticated --min-instances=0 --max-instances=1 --memory=256Mi --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:our-places-db-dev --quiet'

      # ---------------------------------------------------------
      # Feedback Loop
      # ---------------------------------------------------------
      - name: Comment on PR
        uses: actions/github-script@v6
        if: github.event_name == 'pull_request'
        with:
          script: |
            const branch = '${{ steps.branch_name.outputs.SERVICE_SUFFIX }}';
            const listingUrl = '${{ steps.deploy_listing.outputs.url }}';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview Environment Deployed!**\n\n- **Branch:** \`${branch}\`\n- **Listing API:** [${listingUrl}](${listingUrl})\n- **Schema:** \`${{ steps.branch_name.outputs.SCHEMA_NAME }}\`\n\nThe full stack is actively deploying. Check the CI/CD logs for status!`
            })

