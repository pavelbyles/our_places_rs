name: CI/CD for app_api
env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT }}
  SERVICE: our-places-app-api-rs
  REGION: us-central1
  CARGO_TERM_COLOR: always

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - app_api/**
      - .github/workflows/cicd_app_api.yml

jobs:
  test:
    runs-on: ubuntu-latest
    if: 1 == 0

    defaults:
      run:
        working-directory: ./app_api

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - run: cargo install cargo-audit
      - run: cargo audit
        continue-on-error: true

      - run: rustup component add clippy

      - name: Lint checker - Fail on warnings
        uses: actions-rs/clippy-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --all-features --manifest-path app_api/Cargo.toml
      
      - name: Build
        run: cargo build --verbose
      
      - name: Run API tests
        run: cargo test --verbose

  
  build-and-deploy:
    runs-on: ubuntu-latest
    # needs: [test]

    # Add "id-token" with the intended permissions.
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v3
    
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
      
      - name: Authorize Docker push
        run: gcloud auth configure-docker

      - name: Build and Push Container (release)
        working-directory: ./app_api
        if: github.ref == 'refs/heads/main'
        run: |-
          docker build --build-arg="BUILD_TYPE=release" -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }} .
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }}

      - name: Build and Push Container (dev)
        working-directory: ./app_api
        if: github.ref != 'refs/heads/main'
        run: |-
          docker build --build-arg="BUILD_TYPE=dev" -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }} .
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }}
        
      - name: Deploy to Cloud Run
        working-directory: ./app_api
        run: |-
          gcloud run deploy ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --image gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }} \
            --platform "managed" \
            --allow-unauthenticated \
            --max-instances 1 \
            --memory 256Mi \
            --quiet