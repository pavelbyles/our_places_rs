name: CI/CD for app_api
env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT }}
  SERVICE: our-places-app-api-rs
  REGION: us-central1
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://postgres:password@localhost:5432/ourplaces_db

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - app_api/**
      - .github/workflows/cicd_app_api.yml

jobs:
  audit:
    name: Audit
    defaults:
      run:
        working-directory: ./app_api

    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rs/install@v0.1
        with:
          crate: cargo-audit
          version: latest
          use-tool-cache: true
      - run: cargo audit

  lint_check:
    defaults:
      run:
        working-directory: ./app_api

    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rs/toolchain@v1
        with:
            toolchain: nightly
            components: clippy
            override: true
      - uses: davidB/rust-cargo-make@v1

      - name: Install sqlx (needed for successful compilations)
        run: |-
          sudo apt-get install libpq-dev -y
          cargo install --version=~0.7 sqlx-cli --no-default-features --features rustls,postgres --force

      - name: Build Postgres container image (necessary for sqlx)
        run: cargo make docker-db-build

      - name: Run PostgreSQL image in a container (necessary for sqlx)
        run: cargo make docker-db-run

      - name: Run database migrations (necessary for sqlx)
        run: SKIP_DOCKER=true cargo make run-db-migrations

      - uses: actions-rs/clippy-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --all-features --manifest-path app_api/Cargo.toml


  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./app_api
    
    if: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install cargo make
        uses: davidB/rust-cargo-make@v1

      - name: Install sqlx (needed for compilation and integration tests)
        run: |-
          sudo apt-get install libpq-dev -y
          cargo install --version=~0.7 sqlx-cli --no-default-features --features rustls,postgres --force

      - name: Build Postgres container image (necessary for sqlx)
        run: cargo make docker-db-build

      - name: Run PostgreSQL image in a container (necessary for sqlx)
        run: cargo make docker-db-run

      - name: Run database migrations (necessary for sqlx)
        run: SKIP_DOCKER=true cargo make run-db-migrations
      
      - name: Build app
        run: cargo build --verbose
      
      - name: Run API tests
        run: cargo test --verbose

  
  build-and-deploy:
    runs-on: ubuntu-latest
    #needs: [audit, lint_check, test]
    
    defaults:
      run:
        working-directory: ./app_api

    # Add "id-token" with the intended permissions.
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v3
    
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
      
      - name: Authorize Docker push
        run: gcloud auth configure-docker

      - name: Install cargo make
        uses: davidB/rust-cargo-make@v1

      - name: Install sqlx (needed for compilation)
        run: |-
          sudo apt-get install libpq-dev -y
          cargo install --version=~0.7 sqlx-cli --no-default-features --features rustls,postgres --force

      - name: Build and run Postgres container image (necessary for sqlx)
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_BUILD_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_BUILD_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_BUILD_DB }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_BUILD_HOST }}
        run: cargo make docker-db-build
      
      - name: Run PostgreSQL image in a container (necessary for sqlx)
        run: cargo make docker-db-run

      - name: Run database migrations (necessary for sqlx)
        run: SKIP_DOCKER=true cargo make run-db-migrations

      - name: Run database migrations (release) (necessary for sqlx)
        if: github.ref == 'refs/heads/main'
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_BUILD_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_BUILD_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_BUILD_DB }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_BUILD_HOST }}
        run: |-
          SKIP_DOCKER=true POSTGRES_USER=${{ secrets.POSTGRES_USER_PROD }} POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD_PROD }} POSTGRES_DB=${{ secrets.POSTGRES_DB_PROD }} POSTGRES_HOST=${{ secrets.POSTGRES_HOST_PROD }} cargo make run-db-migrations

      - name: Run database migrations (dev) - Build Step (necessary for sqlx)
        if: github.ref != 'refs/heads/main'
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_BUILD_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_BUILD_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_BUILD_DB }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_BUILD_HOST }}
        run: |-
          SKIP_DOCKER=true cargo make run-db-migrations

      - name: Build app
        run: cargo make dev-build-flow

      - name: Build and Push Container (release)
        if: github.ref == 'refs/heads/main'
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER_PROD }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD_PROD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB_PROD }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST_PROD }}
        run: |-
          docker build \
            --build-arg BUILD_TYPE=release \
            --build-arg BUILD_OUTPUT=release \
            --build-arg POSTGRES_USER_ARG=$POSTGRES_USER \
            --build-arg POSTGRES_PASSWORD_ARG=$POSTGRES_PASSWORD \
            --build-arg POSTGRES_DB_ARG=$POSTGRES_DB \
            --build-arg POSTGRES_HOST_ARG=$POSTGRES_HOST \
            -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }} .
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }}

      - name: Build and Push Container (dev)
        if: github.ref != 'refs/heads/main'
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER_DEV }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD_DEV }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB_DEV }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST_DEV }}
        run: |-
          docker build \
            --build-arg BUILD_TYPE=dev \
            --build-arg BUILD_OUTPUT=debug \
            --build-arg POSTGRES_USER_ARG=$POSTGRES_USER \
            --build-arg POSTGRES_PASSWORD_ARG=$POSTGRES_PASSWORD \
            --build-arg POSTGRES_DB_ARG=$POSTGRES_DB \
            --build-arg POSTGRES_HOST_ARG=$POSTGRES_HOST \
            -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }} -f Dockerfile-dev .
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }}

      - name: Run database migrations (release) - Deploy Step (necessary for sqlx)
        if: github.ref == 'refs/heads/main'
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER_PROD }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD_PROD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB_PROD }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_BUILD_HOST_PROD }}
        run: |-
          SKIP_DOCKER=true cargo make run-db-migrations

      - name: Run database migrations (dev) - Deploy Step (necessary for sqlx)
        if: github.ref != 'refs/heads/main'
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER_DEV }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD_DEV }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB_DEV }}
          POSTGRES_HOST: localhost
        run: |-
          curl -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.12.0/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          ./cloud-sql-proxy our-places-dev:us-east1:our-places-db-dev
          SKIP_DOCKER=true cargo make run-db-migrations

      - name: Deploy to Cloud Run
        run: |-
          gcloud run deploy ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --image gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }} \
            --platform "managed" \
            --no-allow-unauthenticated \
            --max-instances 1 \
            --memory 256Mi \
            --quiet


  automated-api-tests:
    runs-on: ubuntu-latest
    needs: [build-and-deploy]
    steps:
      - uses: actions/checkout@v3
      - name: Install Postman CLI

        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
      - name: Login to Postman CLI
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}
      - name: Run API tests

        # Runs the sanity check collection using the postman-sanity-checks-api-key
        run: |
          postman collection run "701056-bf0597d5-23ee-4374-97f7-c3741a532c3f" -e "701056-4394872e-dc91-4235-8461-cf429a72769e"
